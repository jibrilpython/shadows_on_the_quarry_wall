name: shadows_on_the_quarry_wall
description: "A digital archive for industrial stone-cutting antiquities, masonry engineering tools, and architectural craftsmanship heritage."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.3.2
  image_picker: ^1.2.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  uuid: ^4.5.2
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/icon.png
    - assets/images/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#F3F1ED"
  adaptive_icon_foreground: "assets/images/icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#F3F1ED"
  image: "assets/images/logo.png"
  android: true
  ios: true
  web: true
  android_12:
    image: "assets/images/logo.png"
    color: "#F3F1ED"
